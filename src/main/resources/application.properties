spring.application.name=driveconnect
# Application Name
#spring.application.name=DriveConnect

# DriveConnect Cloud Database Connection
spring.datasource.url=jdbc:mysql://driveconnect-db-dhanidhuthanuja-6641.g.aivencloud.com:26602/defaultdb?sslMode=REQUIRED
spring.datasource.username=avnadmin
spring.datasource.password=${DB_PASSWORD}

# Hibernate / JPA Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Java 21 Performance (Virtual Threads)
spring.threads.virtual.enabled=true

# Spring Mail Configuration
# Spring Mail Configuration (Safe Version)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
# These pull from IntelliJ's hidden environment settings!
spring.mail.username=${MY_EMAIL}
spring.mail.password=${MY_APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true